# Render.com deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: community-highlighter
    runtime: python
    plan: starter
    disk:
      name: kb-data
      mountPath: /data/knowledge_base
      sizeGB: 1
    buildCommand: |
      pip install -r requirements.txt
      python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords'); nltk.download('punkt_tab')"
      npm install
      npm run build
    startCommand: python app.py
    envVars:
      - key: CLOUD_MODE
        value: "true"
      - key: OPENAI_API_KEY
        sync: false  # Set this in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false  # Enables Gemini models (recommended)
      - key: YOUTUBE_API_KEY
        sync: false  # Optional — improves transcript fetching & meeting search
      - key: YOUTUBE_API_KEY_SECONDARY
        sync: false  # Optional — auto-failover when primary quota exceeded
      - key: KB_PERSIST_DIR
        value: "/data/knowledge_base/chroma_db"
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /api/health
    autoDeploy: true
