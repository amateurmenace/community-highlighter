name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to attach the build to (e.g., v7.1.0)'
        required: true
        default: 'v7.1.0'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Node dependencies and build frontend
        run: |
          npm ci
          npm run build

      - name: Build Windows executable
        run: pyinstaller CommunityHighlighter-Windows.spec --clean --noconfirm

      - name: Create ZIP
        run: Compress-Archive -Path dist\CommunityHighlighter -DestinationPath CommunityHighlighter-${{ github.event.inputs.version }}-Windows.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: CommunityHighlighter-${{ github.event.inputs.version }}-Windows.zip
